<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 관리</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 1400px; /* 고정 너비로 설정 */
            padding: 20px;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 2.5em;
            color: #333;
        }
        .button {
            padding: 10px 20px;
            background-color: #17a2b8;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }
        .button:hover {
            background-color: #138496;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
            vertical-align: middle; /* 수정: 수직 정렬을 중간으로 설정 */
        }
        th {
            background-color: #f5f5f5;
            color: #333;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .button-accept, .button-deliver {
            width: 100px; /* 버튼의 가로 길이 조정 */
            padding: 8px 12px;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
            transition: background-color 0.3s ease;
            margin-bottom: 8px; /* 버튼과 하단 선 사이의 간격 추가 */
        }
        .button-accept {
            background-color: #17a2b8;
        }
        .button-accept:hover {
            background-color: #138496;
        }
        .button-deliver {
            background-color: #6c757d;
        }
        .button-deliver:hover {
            background-color: #5a6268;
        }
        .button-container {
            display: flex;
            gap: 10px;
            flex-direction: column; /* 버튼을 수직 정렬 */
        }
        /* 모달 스타일 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 600px; /* 고정 너비로 설정 */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-weight: bold;
        }
        input {
            margin-bottom: 16px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button[type="submit"] {
            align-self: flex-start;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <h1>주문 관리</h1>
            <button class="button" @click="openModal">메뉴 등록</button>
        </div>
        <table>
            <thead>
            <tr>
                <th>주문번호</th>
                <th>주문내용</th>
                <th>상태</th>
                <th>작업</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>68</td>
                <td>
                    <ul>
                        <li>닷사이 3000</li>
                        <li>홋카이산 2000</li>
                    </ul>
                </td>
                <td>ORDER</td>
                <td class="button-container">
                    <button class="button-accept">주문수락</button>
                    <button class="button-deliver">배달시작</button>
                </td>
            </tr>
            <tr>
                <td>67</td>
                <td>
                    <ul>
                        <li>히메노아 6500</li>
                        <li>준마이다이긴조 2000</li>
                    </ul>
                </td>
                <td>ORDER</td>
                <td class="button-container">
                    <button class="button-accept">주문수락</button>
                    <button class="button-deliver">배달시작</button>
                </td>
            </tr>
            <tr>
                <td>65</td>
                <td>
                    <ul>
                        <li>닷사이 3000</li>
                        <li>이토엔 1000</li>
                        <li>긴죠 4500</li>
                    </ul>
                </td>
                <td>ORDER</td>
                <td class="button-container">
                    <button class="button-accept">주문수락</button>
                    <button class="button-deliver">배달시작</button>
                </td>
            </tr>
            <tr>
                <td>64</td>
                <td>
                    <ul>
                        <li>준마이다이긴조 2000</li>
                        <li>간바레 오또상 1500</li>
                    </ul>
                </td>
                <td>ORDER</td>
                <td class="button-container">
                    <button class="button-accept">주문수락</button>
                    <button class="button-deliver">배달시작</button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 모달 -->
    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close" @click="closeModal">&times;</span>
            <h2>메뉴 등록</h2>
            <form @submit.prevent="registerMenu">
                <label for="store_id">가게 ID</label>
                <input type="number" id="store_id" v-model="menu.store_id" required>

                <label for="name">메뉴 이름</label>
                <input type="text" id="name" v-model="menu.name" required>

                <label for="amount">가격</label>
                <input type="number" id="amount" v-model="menu.amount" required>

                <label for="thumbnail_url">썸네일 URL</label>
                <input type="url" id="thumbnail_url" v-model="menu.thumbnail_url" required>

                <button type="submit" class="button">메뉴 등록</button>
            </form>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: "#app",
        data: {
            orders: [], // 서버로부터 받은 주문 데이터를 저장할 배열
            menu: {
                store_id: 0,
                name: '',
                amount: 0,
                thumbnail_url: ''
            }
        },
        methods: {
            acceptOrder(order) {
                console.log("주문수락:", order);
            },
            startDelivery(order) {
                console.log("배달시작:", order);
            },
            pushData(order){
                this.orders.unshift(order);
            },
            openModal() {
                document.getElementById("menuModal").style.display = "block";
            },
            closeModal() {
                document.getElementById("menuModal").style.display = "none";
            },
            registerMenu() {
                const apiUrl = 'http://localhost:8080/open-api/store-menu/register';
                const payload = {
                    result: {
                        result_code: 0,
                        result_message: '',
                        result_description: ''
                    },
                    body: this.menu
                };

                axios.post(apiUrl, payload)
                    .then(response => {
                        console.log(response.data);
                        alert('메뉴가 성공적으로 등록되었습니다.');
                        this.menu = {
                            store_id: 0,
                            name: '',
                            amount: 0,
                            thumbnail_url: ''
                        };
                        this.closeModal(); // 메뉴 등록 후 모달 닫기
                    })
                    .catch(error => {
                        console.error(error);
                        alert('메뉴 등록 중 오류가 발생했습니다.');
                    });
            }
        },
        mounted() {
            // SSE 연결
            const url = "http://localhost:8082/api/sse/connect";    // 접속주소
            const eventSource = new EventSource(url);               // sse 연결

            eventSource.onopen = event => {
                console.log("sse connection")
            }

            eventSource.onmessage = event => {
                console.log("receive : "+event.data);
                const data = JSON.parse(event.data);
                this.pushData(data);
            }
        }
    });
</script>
</body>
</html>
